<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Progress Bar Examples</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

  <!-- Basic Progress Bar -->
  <h5>Basic Progress Bar</h5>
  <div class="progress mb-3">
    <div class="progress-bar" style="width: 50%"></div>
  </div>

  <!-- Progress Bar Height -->
  <h5>Progress Bar Height</h5>
  <div class="progress mb-3" style="height: 30px;">
    <div class="progress-bar" style="width: 60%"></div>
  </div>

  <!-- Progress Bar Labels -->
  <h5>Progress Bar with Label</h5>
  <div class="progress mb-3">
    <div class="progress-bar" style="width: 70%">70%</div>
  </div>

  <!-- Colored Progress Bars -->
  <h5>Colored Progress Bars</h5>
  <div class="progress mb-3">
    <div class="progress-bar bg-success" style="width: 40%">Success</div>
  </div>
  <div class="progress mb-3">
    <div class="progress-bar bg-info" style="width: 60%">Info</div>
  </div>
  <div class="progress mb-3">
    <div class="progress-bar bg-warning" style="width: 80%">Warning</div>
  </div>
  <div class="progress mb-3">
    <div class="progress-bar bg-danger" style="width: 90%">Danger</div>
  </div>

  <!-- Striped Progress Bars -->
  <h5>Striped Progress Bars</h5>
  <div class="progress mb-3">
    <div class="progress-bar progress-bar-striped" style="width: 50%"></div>
  </div>

  <!-- Animated Progress Bar -->
  <h5>Animated Progress Bar</h5>
  <div class="progress mb-3">
    <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 75%"></div>
  </div>

  <!-- Multiple Progress Bars -->
  <h5>Multiple Progress Bars</h5>
  <div class="progress mb-3">
    <div class="progress-bar bg-success" style="width: 30%">30%</div>
    <div class="progress-bar bg-warning" style="width: 20%">20%</div>
    <div class="progress-bar bg-danger" style="width: 25%">25%</div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
